name: Android APK

# Builds an installable (debug-signed) universal APK, attaches it to the latest
# release, then boots an Android emulator, installs it, launches the app and
# captures a screenshot.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: "26.1.10909125"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK + platform tools
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "ndk;${NDK_VERSION}" "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          echo "NDK_HOME=$ANDROID_HOME/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Install Rust + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Initialize Android project
        run: npx tauri android init --ci

      - name: Generate app icons (bishop)
        run: npx tauri icon app-icon.svg

      # Universal debug APK: installs on phones (arm64) AND the x86_64 emulator.
      - name: Build APK
        run: npx tauri android build --apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: chess-mini-android-apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error

      - name: Attach APK to the latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK=$(find src-tauri/gen/android/app/build/outputs/apk -name "*universal*.apk" | head -1)
          VERSION=$(node -p "require('./package.json').version")
          cp "$APK" "Chess-Mini_${VERSION}_android.apk"
          TAG=$(gh release view --json tagName -q .tagName)
          gh release upload "$TAG" "Chess-Mini_${VERSION}_android.apk" --clobber
          echo "Attached APK to release $TAG"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run on emulator + screenshot
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: |
            APK=$(find src-tauri/gen/android/app/build/outputs/apk -name "*universal*.apk" | head -1)
            adb install -r "$APK"
            AAPT=$(find "$ANDROID_HOME/build-tools" -name aapt | sort | tail -1)
            PKG=$("$AAPT" dump badging "$APK" | sed -n "s/.*package: name='\([^']*\)'.*/\1/p")
            echo "Launching $PKG"
            adb shell monkey -p "$PKG" -c android.intent.category.LAUNCHER 1 || true
            sleep 14
            adb exec-out screencap -p > emulator-screenshot.png

      - name: Upload emulator screenshot
        uses: actions/upload-artifact@v4
        with:
          name: chess-mini-emulator-screenshot
          path: emulator-screenshot.png
          if-no-files-found: warn
