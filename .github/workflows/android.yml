name: Android APK

# Manual build of an installable (debug-signed) Android APK.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: "26.1.10909125"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK + platform tools
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "ndk;${NDK_VERSION}" "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          echo "NDK_HOME=$ANDROID_HOME/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Install Rust + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Initialize Android project
        run: npx tauri android init --ci

      # Write the bishop launcher icons into the freshly-generated Android res/
      # (otherwise it ships the default Tauri logo).
      - name: Generate app icons
        run: npx tauri icon app-icon.svg

      # Debug build is signed with the debug keystore → installable for testing.
      # Use arm64 only for a fast, broadly-compatible build (most modern phones).
      - name: Build APK
        run: npx tauri android build --apk --debug --target aarch64

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: chess-mini-android-apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error

      - name: Attach APK to the latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK=$(find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" | head -1)
          VERSION=$(node -p "require('./package.json').version")
          cp "$APK" "Chess-Mini_${VERSION}_android-arm64.apk"
          TAG=$(gh release view --json tagName -q .tagName)
          gh release upload "$TAG" "Chess-Mini_${VERSION}_android-arm64.apk" --clobber
          echo "Attached APK to release $TAG"

