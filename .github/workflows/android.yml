name: Android APK

# Builds a release-signed universal APK whenever a version tag is pushed
# (i.e. after desktop `release.yml` creates the tag), attaches it to the
# GitHub Release, and uploads it as a workflow artifact.
#
# Also available manually with optional emulator screenshot.
#
# Skip an automatic Android build by including `[skip android]` in the commit
# message of the push that triggered the release.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag or commit to build (leave empty for default branch)"
        required: false
        type: string
        default: ""
      build_type:
        description: "Build type"
        required: true
        type: choice
        default: "release"
        options:
          - release
          - debug
      run_emulator:
        description: "Run emulator + screenshot after build?"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NDK_VERSION: "26.1.10909125"
      # Strip native debug symbols so the universal APK stays ~25 MB per ABI
      # instead of ~130 MB.
      CARGO_PROFILE_DEV_STRIP: symbols
    steps:
      # ── Checkout ──────────────────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      # On tag push, skip the entire job when the tag's commit carries the
      # [skip android] flag (propagated by release.yml's bump step).
      - name: Check skip conditions
        if: github.event_name == 'push'
        shell: bash
        run: |
          COMMIT_MSG=$(git log -1 --format=%B "${{ github.ref_name }}" 2>/dev/null || true)
          if [[ "$COMMIT_MSG" == *"[skip android]"* ]]; then
            echo "[skip android] found — exiting"
            exit 0
          fi
          echo "Android build will proceed."

      # ── Frontend toolchain ────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      # ── Android SDK / NDK / Java ──────────────────────────────────────
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK + platform tools
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "ndk;${NDK_VERSION}" "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          echo "NDK_HOME=$ANDROID_HOME/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

      # ── Rust toolchain ────────────────────────────────────────────────
      - name: Install Rust + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            aarch64-linux-android,
            armv7-linux-androideabi,
            i686-linux-android,
            x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── Generate & patch Android project ──────────────────────────────
      - name: Initialize Android project
        run: npx tauri android init --ci

      - name: Generate app icons
        run: npx tauri icon app-icon.svg

      - name: Enable adjustResize for soft keyboard
        run: |
          MANIFEST=src-tauri/gen/android/app/src/main/AndroidManifest.xml
          if ! grep -q 'windowSoftInputMode' "$MANIFEST"; then
            sed -i 's#android:name=".MainActivity"#android:name=".MainActivity"\n            android:windowSoftInputMode="adjustResize"#' "$MANIFEST"
          fi
          grep windowSoftInputMode "$MANIFEST"

      - name: Patch Android theme (status bar / edge-to-edge)
        run: node scripts/patch-android.mjs

      - name: Configure release signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: node scripts/patch-android-signing.mjs

      # ── Gradle cache (dependencies + build outputs) ───────────────────
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          build-scan-publish: false

      # ── Build ─────────────────────────────────────────────────────────
      - name: Build APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # Determine build mode: debug is the safe default when signing
          # secrets haven't been configured yet.
          MODE=""
          HAS_SIGNING="${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}"

          if [ "${{ inputs.build_type }}" = "debug" ]; then
            MODE="--debug"
          elif [ "$HAS_SIGNING" != "true" ]; then
            echo "No signing keystore configured — falling back to debug build"
            MODE="--debug"
          fi

          npx tauri android build --apk $MODE

      # ── Upload artifacts ──────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: chess-journal-android-apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error

      # Attach APK to the GitHub Release.  On tag push the release may not
      # exist yet (desktop build still running), so we retry with a back-off.
      - name: Attach APK to GitHub Release
        if: >-
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && inputs.ref != '')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK=$(find src-tauri/gen/android/app/build/outputs/apk \
            \( -name "*universal*.apk" -o -name "*.apk" \) \
            ! -name "*unaligned*" -print -quit)
          if [ -z "$APK" ]; then
            echo "No APK found" >&2
            find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" >&2 || true
            exit 1
          fi

          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="${{ inputs.ref }}"
          fi
          TAG="${TAG#refs/tags/}"
          VERSION="${TAG#v}"
          cp "$APK" "Chess-Journal_${VERSION}_android.apk"
          echo "APK: $(ls -lh "Chess-Journal_${VERSION}_android.apk")"

          for i in $(seq 1 20); do
            if gh release view "$TAG" > /dev/null 2>&1; then
              break
            fi
            echo "Waiting for release $TAG … ($i/20)"
            sleep 30
          done

          gh release upload "$TAG" "Chess-Journal_${VERSION}_android.apk" --clobber
          echo "Attached APK to release $TAG"

      # ── Emulator test (manual only) ───────────────────────────────────
      - name: Enable KVM
        if: github.event_name == 'workflow_dispatch' && inputs.run_emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run on emulator + screenshot
        if: github.event_name == 'workflow_dispatch' && inputs.run_emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: bash scripts/emulator-run.sh

      - name: Upload emulator screenshot
        if: github.event_name == 'workflow_dispatch' && inputs.run_emulator
        uses: actions/upload-artifact@v4
        with:
          name: chess-journal-emulator-screenshot
          path: emulator-screenshot.png
          if-no-files-found: warn
