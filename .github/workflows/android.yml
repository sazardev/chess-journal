name: Android APK

# Builds an installable (debug-signed) universal APK, attaches it to the latest
# release, then boots an Android emulator, installs it, launches the app and
# captures a screenshot.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: "26.1.10909125"
      # Strip native debug symbols — a debug .so keeps full debuginfo (~130 MB
      # per ABI), which bloats the universal APK and can exceed emulator/device
      # storage on install. Stripped, each ABI is ~15-25 MB.
      CARGO_PROFILE_DEV_STRIP: symbols
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK + platform tools
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "ndk;${NDK_VERSION}" "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          echo "NDK_HOME=$ANDROID_HOME/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Install Rust + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Initialize Android project
        run: npx tauri android init --ci

      - name: Generate app icons (bishop)
        run: npx tauri icon app-icon.svg

      # Resize the WebView when the soft keyboard appears so the move-input bar
      # stays above it (gen/android is regenerated by `tauri android init`).
      - name: Enable adjustResize for the soft keyboard
        run: |
          MANIFEST=src-tauri/gen/android/app/src/main/AndroidManifest.xml
          if ! grep -q 'windowSoftInputMode' "$MANIFEST"; then
            sed -i 's#android:name=".MainActivity"#android:name=".MainActivity"\n            android:windowSoftInputMode="adjustResize"#' "$MANIFEST"
          fi
          grep windowSoftInputMode "$MANIFEST"

      # Universal debug APK: installs on phones (arm64) AND the x86_64 emulator.
      - name: Build APK
        run: npx tauri android build --apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: chess-mini-android-apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error

      - name: Attach APK to the latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK=$(find src-tauri/gen/android/app/build/outputs/apk -name "*universal*.apk" | head -1)
          VERSION=$(node -p "require('./package.json').version")
          cp "$APK" "Chess-Mini_${VERSION}_android.apk"
          TAG=$(gh release view --json tagName -q .tagName)
          gh release upload "$TAG" "Chess-Mini_${VERSION}_android.apk" --clobber
          echo "Attached APK to release $TAG"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run on emulator + screenshot
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: bash scripts/emulator-run.sh

      - name: Upload emulator screenshot
        uses: actions/upload-artifact@v4
        with:
          name: chess-mini-emulator-screenshot
          path: emulator-screenshot.png
          if-no-files-found: warn
