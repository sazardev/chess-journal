name: CI

# Quality gate for every pull request (and pushes to master): lint, typecheck
# and the vitest suite. Frontend-only — no Rust/Tauri toolchain needed, so this
# stays fast on ubuntu.
on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

# A new push to the same ref cancels the previous in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
