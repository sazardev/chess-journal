name: Release

on:
  # Every push to master that touches app code ships a new patch release.
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"
      - ".github/**"
      - "app-icon.svg"
  # Manual run lets you pick the bump (none / patch / minor / major).
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump"
        type: choice
        required: true
        default: patch
        options:
          - none
          - patch
          - minor
          - major

permissions:
  contents: write

# Never run two releases at once.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    # Skip the bot's own release commit and any commit tagged [skip release].
    if: >-
      github.event_name == 'workflow_dispatch' ||
      ( !startsWith(github.event.head_commit.message, 'chore: release') &&
        !contains(github.event.head_commit.message, '[skip release]') )
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Resolve version (bump, commit & tag)
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BUMP="${{ inputs.bump }}"
          else
            BUMP="patch"
          fi

          if [ "$BUMP" != "none" ]; then
            node scripts/bump-version.mjs "$BUMP"
            VERSION=$(node -p "require('./package.json').version")
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml CHANGELOG.md
            git commit -m "chore: release v$VERSION [skip release]"
            git tag -a "v$VERSION" -m "Chess Journal v$VERSION"
            git push origin "HEAD:${GITHUB_REF_NAME}" --follow-tags
          else
            VERSION=$(node -p "require('./package.json').version")
          fi

          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build & release (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.version.outputs.tag }}
          releaseName: "Chess Journal ${{ steps.version.outputs.tag }}"
          releaseBody: "Download **Chess Journal_${{ steps.version.outputs.version }}_x64-setup.exe** below and run it. Installed copies update themselves automatically."
          releaseDraft: false
          prerelease: false
