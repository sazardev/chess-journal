name: Release

on:
  # Every push to master that touches app code ships a new patch release.
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"
      - ".github/**"
      - "app-icon.svg"
  # Manual run lets you pick the bump (none / patch / minor / major).
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump"
        type: choice
        required: true
        default: patch
        options:
          - none
          - patch
          - minor
          - major

permissions:
  contents: write

# Never run two releases at once.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    # Skip the bot's own release commit and any commit tagged [skip release].
    if: >-
      github.event_name == 'workflow_dispatch' ||
      ( !startsWith(github.event.head_commit.message, 'chore: release') &&
        !contains(github.event.head_commit.message, '[skip release]') )
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve version (bump, commit & tag)
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BUMP="${{ inputs.bump }}"
          else
            BUMP="patch"
          fi

          # Propagate [skip android] from the triggering commit to the release
          # commit so the Android workflow (triggered by the tag push) can read
          # the flag and skip its build.
          # Propagate [skip android] when it appears as a standalone flag
          # (end of line, or followed by another `]` flag).  This avoids
          # accidentally matching prose that happens to mention the token.
          ORIGINAL_MSG=$(git log -1 --format=%B ${{ github.sha }} 2>/dev/null || true)
          SKIP_ANDROID=""
          if echo "$ORIGINAL_MSG" | grep -qE '\[skip android\](\s*$|\s*\])'; then
            SKIP_ANDROID=" [skip android]"
          fi

          if [ "$BUMP" != "none" ]; then
            node scripts/bump-version.mjs "$BUMP"
            VERSION=$(node -p "require('./package.json').version")
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml CHANGELOG.md
            git commit -m "chore: release v$VERSION [skip release]${SKIP_ANDROID}"
            git tag -a "v$VERSION" -m "Chess Journal v$VERSION"
            git push origin "HEAD:${GITHUB_REF_NAME}" --follow-tags
          else
            VERSION=$(node -p "require('./package.json').version")
          fi

          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # GITHUB_TOKEN pushes don't trigger new workflows (by design), so we
      # explicitly dispatch the Android build.  It builds in parallel with
      # the desktop release below and retries upload until the Release exists.
      - name: Trigger Android build
        if: steps.version.outputs.tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ORIGINAL_MSG=$(git log -1 --format=%B ${{ github.sha }} 2>/dev/null || true)
          if echo "$ORIGINAL_MSG" | grep -qE '\[skip android\](\s*$|\s*\])'; then
            echo "[skip android] detected — skipping Android dispatch"
          else
            gh workflow run android.yml -f ref="${{ steps.version.outputs.tag }}" \
              -f build_type=release -f run_emulator=false
            echo "Android build dispatched for ${{ steps.version.outputs.tag }}"
          fi

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build & release (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.version.outputs.tag }}
          releaseName: "Chess Journal ${{ steps.version.outputs.tag }}"
          releaseBody: "Download **Chess Journal_${{ steps.version.outputs.version }}_x64-setup.exe** below and run it. Installed copies update themselves automatically."
          releaseDraft: false
          prerelease: false
