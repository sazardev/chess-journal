# Build scripts skipped intentionally:
# - stockfish: app uses the vendored public/stockfish-engine.js, never imports the package.
# - onnxruntime-node: @huggingface/transformers is used in browser WASM mode only;
#   the native Node.js binding is not needed.
# - protobufjs / sharp: transitive deps that don't need native compilation for this app.
allowBuilds:
  onnxruntime-node: false
  protobufjs: false
  sharp: false
  stockfish: false
